<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Parametric Modelling demo</title>
    <link data-trunk rel="copy-dir" href="assets" />
    <link data-trunk rel="inline" href="web/styles.css" />
    <link data-trunk rel="tailwind-css" href="web/tailwind.css" />
  </head>
  <body class="bg-slate-900 w-full h-screen flex flex-col items-stretch overflow-hidden">
    <link
      data-trunk
      rel="rust"
      href="./pmetra_demo"
      data-type="main"
      data-wasm-opt="0"
    />
    <header class="text-gray-400 bg-gray-950 body-font">
      <div
        class="container mx-auto flex flex-wrap px-5 py-2.5 flex-col md:flex-row items-center"
      >
        <span class="text-white text-xl font-medium">
          Parametric Modelling demo
        </span>
      </div>
    </header>
    <nav class="bg-gray-900 border-b border-gray-800">
      <div
        class="container mx-auto px-5 py-3 flex flex-wrap gap-2 justify-center"
        id="demo-picker"
      >
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="SimplCubeAtCylinder"
          disabled
        >
          Cube on Cylinder
        </button>
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="TowerExtension"
          disabled
        >
          Tower Extension
        </button>
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="RoundCabinSegment"
          disabled
        >
          Round Cabin Segment
        </button>
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="ExpNurbsSolid"
          disabled
        >
          NURBS Solid
        </button>
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="MultiModelsSimplCubeAtCylinderAndTowerExtension"
          disabled
        >
          Multi: Cube + Tower
        </button>
        <button
          type="button"
          class="demo-btn bg-gray-800 text-gray-200 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed px-3 py-1.5 rounded text-sm transition-colors"
          data-demo="MultiModels2TowerExtensions"
          disabled
        >
          Multi: 2 Towers
        </button>
      </div>
    </nav>
    <main class="stage">
      <div class="loading">
        <div class="lds-dual-ring"></div>
        <div class="text-white mt-4">LOADING</div>
      </div>
      <canvas id="bevy">Javascript and support for canvas is required</canvas>
    </main>
    <script>
      // Synthetic touch dispatch — used by the MCP simulate_touch tool so
      // automation can exercise the mobile drag-handle flow without human
      // hands on a real phone. Fires touchstart → N touchmoves over
      // `durationMs` → touchend. All coords are canvas-local (pixels from
      // canvas top-left). Fire-and-forget; caller sleeps durationMs.
      window._pmetraSimulateTouch = function (x1, y1, x2, y2, durationMs) {
        const canvas = document.querySelector("canvas");
        if (!canvas) return false;
        if (typeof Touch !== "function" || typeof TouchEvent !== "function") {
          console.warn("_pmetraSimulateTouch: Touch/TouchEvent not supported");
          return false;
        }
        const rect = canvas.getBoundingClientRect();
        const mk = (px, py) =>
          new Touch({
            identifier: 1,
            target: canvas,
            clientX: rect.left + px,
            clientY: rect.top + py,
            pageX: rect.left + px,
            pageY: rect.top + py,
            radiusX: 5,
            radiusY: 5,
            force: 1,
          });
        const dispatch = (type, t) =>
          canvas.dispatchEvent(
            new TouchEvent(type, {
              cancelable: true,
              bubbles: true,
              touches: type === "touchend" ? [] : [t],
              targetTouches: type === "touchend" ? [] : [t],
              changedTouches: [t],
            })
          );
        const dur = Math.max(16, durationMs | 0);
        const steps = Math.max(2, Math.floor(dur / 16));
        dispatch("touchstart", mk(x1, y1));
        let i = 0;
        const iv = setInterval(() => {
          i++;
          const t = Math.min(1, i / steps);
          const x = x1 + (x2 - x1) * t;
          const y = y1 + (y2 - y1) * t;
          if (i >= steps) {
            clearInterval(iv);
            dispatch("touchend", mk(x, y));
          } else {
            dispatch("touchmove", mk(x, y));
          }
        }, dur / steps);
        return true;
      };
    </script>
    <script>
      (function () {
        const buttons = document.querySelectorAll(".demo-btn");
        const activeClasses = ["bg-indigo-600", "hover:bg-indigo-500"];
        const idleClasses = ["bg-gray-800", "hover:bg-gray-700"];

        function setActive(id) {
          buttons.forEach((b) => {
            const isActive = b.dataset.demo === id;
            b.classList.remove(...activeClasses, ...idleClasses);
            b.classList.add(...(isActive ? activeClasses : idleClasses));
          });
        }

        function selectDemo(id) {
          if (!window.pmetra || typeof window.pmetra.set !== "function") return;
          window.pmetra.set(
            "CadGeneratedModelSpawner",
            JSON.stringify({ selected_params: id })
          );
          setActive(id);
        }

        buttons.forEach((b) => {
          b.addEventListener("click", () => selectDemo(b.dataset.demo));
        });

        function enableWhenReady() {
          if (window.pmetra && typeof window.pmetra.get === "function") {
            buttons.forEach((b) => (b.disabled = false));
            const loading = document.querySelector(".loading");
            if (loading) loading.style.display = "none";
            try {
              const current = JSON.parse(
                window.pmetra.get("CadGeneratedModelSpawner") || "{}"
              );
              if (current.selected_params) setActive(current.selected_params);
            } catch (_) {}
            return;
          }
          setTimeout(enableWhenReady, 150);
        }
        enableWhenReady();
      })();
    </script>
  </body>
</html>
